<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - AquaMonitor</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>Личный кабинет</h1>
            <a href="/dashboard" class="btn btn-outline">← Назад</a>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <h3>Информация о пользователе</h3>
            <p><strong>Логин:</strong> <span id="username"></span></p>
        </div>
        <div class="card">
            <h3>Сменить пароль</h3>
            <div id="error" class="error" style="display:none"></div>
            <div id="success" class="success" style="display:none"></div>
            <form id="passwordForm">
                <div class="form-group">
                    <label>Текущий пароль</label>
                    <input type="password" id="old_password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Новый пароль</label>
                    <input type="password" id="new_password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Подтверждение пароля</label>
                    <input type="password" id="confirm_password" class="form-control" required>
                </div>
                <button type="submit" class="btn">Сменить пароль</button>
            </form>
        </div>
        <div class="card">
            <button id="logoutBtn" class="btn btn-danger">Выйти из аккаунта</button>
        </div>
    </div>
    <script src="/static/js/profile.js"></script>
</body>
</html>
